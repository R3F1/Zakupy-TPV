<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień TPV - Premium Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0061ff;
            --secondary-blue: #60efff;
            --urgent-red: #ff416c;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body { 
            background: #f0f2f5; 
            background-image: radial-gradient(at 0% 0%, rgba(0,97,255,0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(96,239,255,0.1) 0, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin-top: 90px;
            min-height: 100vh;
        }

        /* --- ANIMACJE --- */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .view-section { display: none; }
        .active-view { 
            display: block; 
            animation: fadeInScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* --- MODER LOOK (GLASSMORPHISM) --- */
        .navbar-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .card-custom {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card-header-gradient {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            padding: 1.5rem;
            border: none;
            font-weight: 700;
        }

        /* --- STYLIZACJA TABELI --- */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
            background: white;
        }

        .table thead th {
            background: #f8f9fa;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem;
            border: none;
        }

        /* Punkt 1: Wygląd zamówień PILNYCH */
        .row-urgent {
            background-color: rgba(255, 65, 108, 0.05) !important;
            border-left: 5px solid var(--urgent-red) !important;
        }

        .badge-urgent {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            box-shadow: 0 0 10px rgba(255, 65, 108, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Punkt 5: Archiwum */
        .archive-hidden { display: none !important; }

        /* --- PRZYCISKI --- */
        .btn-modern {
            border-radius: 12px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .price-tag {
            color: #0f172a;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-glass fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div class="bg-primary text-white rounded-3 p-2 me-2 shadow-sm">
                <i class="bi bi-box-seam-fill"></i>
            </div>
            <span class="fw-bold text-dark">System Zamówień <span class="text-primary">TPV</span></span>
        </a>
        <div id="logoutBar" class="view-section ms-auto">
            <span class="me-3 small fw-bold text-muted" id="userGreeting"></span>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">
                <i class="bi bi-power me-1"></i>Wyloguj
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">

    <div id="view-login" class="view-section active-view card-custom mx-auto mt-5 shadow" style="max-width: 400px;">
        <div class="p-5 text-center">
            <h3 class="fw-bold mb-4">Witaj ponownie</h3>
            <form id="loginForm">
                <div class="text-start mb-3">
                    <label class="small fw-bold text-muted mb-1">IDENTYFIKATOR</label>
                    <input type="text" id="loginInput" class="form-control form-control-lg border-0 bg-light" placeholder="Np. Kierownik" required>
                </div>
                <div class="text-start mb-4">
                    <label class="small fw-bold text-muted mb-1">HASŁO</label>
                    <input type="password" id="passInput" class="form-control form-control-lg border-0 bg-light" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-modern w-100 py-3 shadow">Zaloguj się</button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card-custom mx-auto mb-4" style="max-width: 1000px;">
        <div class="card-header-gradient">
            <i class="bi bi-plus-circle-fill me-2"></i>NOWE ZAPOTRZEBOWANIE
        </div>
        <div class="card-body p-4">
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="small fw-bold text-muted">NAZWA PRODUKTU</label>
                        <input type="text" id="produkt" class="form-control" placeholder="Wpisz nazwę..." required>
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold text-muted">DZIAŁ</label>
                        <select id="strefa" class="form-select"><option value="OCR">OCR</option><option value="LCM">LCM</option><option value="LCDR">LCDR</option></select>
                    </div>
                    <div class="col-md-1">
                        <label class="small fw-bold text-muted">ILOŚĆ</label>
                        <input type="number" id="ilosc" class="form-control text-center" value="1" required>
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold text-muted">PRIORYTET (Pkt 1)</label>
                        <select id="priorytet" class="form-select fw-bold">
                            <option value="Normalny">Normalny</option>
                            <option value="PILNE" class="text-danger">🔥 PILNE</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="small fw-bold text-muted">SZACOWANA CENA (Pkt 2)</label>
                        <div class="input-group">
                            <input type="number" id="cena" class="form-control" placeholder="0.00">
                            <span class="input-group-text">PLN</span>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold text-muted">LINK DO PRODUKTU</label>
                        <input type="url" id="link" class="form-control" placeholder="https://..." required>
                    </div>
                    <div class="col-12 mt-4 text-end">
                        <button type="submit" class="btn btn-success btn-modern shadow">Wyślij zamówienie</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card-custom shadow-sm mb-5">
        <div class="bg-dark text-white p-4 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"><i class="bi bi-layers-half me-2"></i>REJESTR ZAMÓWIEŃ</h5>
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch text-white mb-0">
                    <input class="form-check-input shadow-none" type="checkbox" id="archiveSwitch" onchange="toggleArchive()">
                    <label class="form-check-label small fw-bold" for="archiveSwitch">Pokaż Archiwum</label>
                </div>
                <button class="btn btn-light btn-sm rounded-circle" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i></button>
            </div>
        </div>
        <div class="card-body p-4">
            <div class="mb-4"><input type="text" id="searchInput" class="form-control rounded-pill px-4 border-0 bg-light" placeholder="Szybkie wyszukiwanie..."></div>
            
            <div class="table-container border">
                <table class="table table-hover align-middle text-center mb-0">
                    <thead>
                        <tr>
                            <th>Produkt</th><th>Strefa</th><th>Ilość</th><th>Cena (Pkt 2)</th><th>Data</th><th>Kto</th><th>Status</th><th>Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="8" class="py-5">Pobieranie bazy danych...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Konfiguracja
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwql25-MnPGsgy5IElCu_EJFvHA9OZpInNOPY47AeJUbaluFidAuKG0x9vGXD9R2SK4hg/exec'; 
    let currentRole = '', currentUser = '', showArchive = false;

    const users = {
        'lider lcm': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCM' },
        'lider lcdr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCDR' },
        'lider ocr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider OCR' },
        'kierownik': { haslo: 'tpv12345!', rola: 'kierownik', nazwa: 'Kierownik' },
        'łukasz': { haslo: 'tpv12345!', rola: 'lukasz', nazwa: 'Łukasz' }
    };

    // Obsługa logowania i sesji
    window.onload = () => {
        const r = localStorage.getItem('userRole'), u = localStorage.getItem('userLogin');
        if (r && u) setupInterface(r, u);
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const l = document.getElementById('loginInput').value.toLowerCase(), p = document.getElementById('passInput').value;
        if (users[l] && users[l].haslo === p) {
            localStorage.setItem('userRole', users[l].rola);
            localStorage.setItem('userLogin', users[l].nazwa);
            setupInterface(users[l].rola, users[l].nazwa);
        } else alert('Błędne dane logowania!');
    };

    function setupInterface(role, user) {
        currentRole = role; currentUser = user;
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
        document.getElementById('logoutBar').classList.add('active-view');
        document.getElementById('userGreeting').innerText = `Dzień dobry, ${user}`;
        document.getElementById('view-table').classList.add('active-view');
        if (role === 'lider') document.getElementById('view-lider').classList.add('active-view');
        loadData();
    }

    function logout() { localStorage.clear(); location.reload(); }

    // Punkt 5: Przełącznik Archiwum
    function toggleArchive() {
        showArchive = document.getElementById('archiveSwitch').checked;
        loadData(); // Odśwież widok
    }

    // Pobieranie i renderowanie
    async function loadData() {
        const tbody = document.getElementById('ordersTableBody');
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderTable(data);
        } catch (e) { tbody.innerHTML = 'Błąd połączenia z bazą.'; }
    }

    function renderTable(data) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';
        
        data.reverse().forEach(row => {
            // Punkt 5: Filtracja archiwum
            if (!showArchive && row.status === 'Dostarczone') return;

            const tr = document.createElement('tr');
            
            // Punkt 1: Styl dla PILNYCH
            if (row.priorytet === 'PILNE') tr.className = 'row-urgent';

            const pBadge = row.priorytet === 'PILNE' ? '<span class="badge badge-urgent me-2">PILNE</span>' : '';
            
            // Punkt 3: Akcje (w tym Anuluj dla Lidera)
            let action = '-';
            if (currentRole === 'kierownik' && row.status === 'Oczekujące') {
                action = `<button class="btn btn-sm btn-success me-1 rounded-pill" onclick="updateStatus(${row.id}, 'Zaakceptowane')">Akceptuj</button>
                          <button class="btn btn-sm btn-danger rounded-pill" onclick="rejectOrder(${row.id})">Odrzuć</button>`;
            } else if (currentRole === 'lider' && row.status === 'Oczekujące' && row.kto === currentUser) {
                // Punkt 3: Możliwość anulowania przez Lidera
                action = `<button class="btn btn-sm btn-outline-danger border-0" onclick="deleteOrder(${row.id})"><i class="bi bi-trash-fill"></i> Anuluj</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zaakceptowane') {
                action = `<button class="btn btn-sm btn-primary rounded-pill" onclick="updateStatus(${row.id}, 'Zamówione')">Zamówione</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zamówione') {
                action = `<button class="btn btn-sm btn-info text-white rounded-pill" onclick="updateStatus(${row.id}, 'Dostarczone')">Dostarczone</button>`;
            }

            tr.innerHTML = `
                <td class="text-start fw-bold">${pBadge}${row.produkt}</td>
                <td><span class="badge bg-light text-dark border">${row.strefa}</span></td>
                <td class="fw-bold">${row.ilosc}</td>
                <td class="price-tag text-primary">${row.cena ? row.cena + ' PLN' : '-'}</td>
                <td class="small text-muted">${formatDate(row.dataZam)}</td>
                <td class="small">${row.kto}</td>
                <td><span class="badge bg-dark rounded-pill px-3">${row.status}</span></td>
                <td>${action}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Pomocnicze funkcje daty i wysyłki
    function formatDate(s) {
        if (!s) return '-';
        const d = new Date(s);
        return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    async function submitOrder(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button'); btn.disabled = true;
        const data = {
            action: 'add', 
            produkt: document.getElementById('produkt').value,
            strefa: document.getElementById('strefa').value, 
            ilosc: document.getElementById('ilosc').value,
            link: document.getElementById('link').value, 
            kto: currentUser,
            priorytet: document.getElementById('priorytet').value,
            cena: document.getElementById('cena').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        e.target.reset(); loadData(); btn.disabled = false;
    }

    async function updateStatus(id, stat, reason = '') {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id, newStatus: stat, reason }) });
        loadData();
    }

    async function deleteOrder(id) {
        if (confirm('Czy na pewno chcesz anulować to zgłoszenie?')) {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
            loadData();
        }
    }

    function rejectOrder(id) {
        const p = prompt("Podaj powód odrzucenia:");
        if (p) updateStatus(id, 'Odrzucone', p);
    }

    document.getElementById('searchInput').onkeyup = function() {
        let v = this.value.toLowerCase();
        document.querySelectorAll('#ordersTableBody tr').forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none";
        });
    }
</script>
</body>
</html>
