<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień TPV - Dział Techniczny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GŁÓWNE ZMIENNE --- */
        :root {
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-color: #f4f7fb; 
            --urgent-red: #ef4444;
            --text-main: #1e293b;
            --card-bg: rgba(255, 255, 255, 1);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --input-bg: #f8fafc;
            --border-color: #e2e8f0;
            --table-hover: #f0f9ff;
            --table-zebra: rgba(241, 245, 249, 0.4);
            --unit-bg: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --skeleton-grad: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
        }

        /* --- TRYB CIEMNY (DARK MODE) --- */
        body.dark-mode {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --card-bg: #1e293b;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --input-bg: #0f172a;
            --border-color: #334155;
            --table-hover: #334155;
            --table-zebra: rgba(255, 255, 255, 0.02);
            --unit-bg: #334155;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --skeleton-grad: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin-top: 80px; 
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Tło gradientowe */
        body:not(.dark-mode) {
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.04), transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.04), transparent 30%);
        }

        /* --- ANIMACJE --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseUrgent { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* --- NAVBAR --- */
        .navbar-glass {
            background: var(--glass-bg); z-index: 1040;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px var(--shadow-color); border-bottom: 1px solid var(--border-color);
            transition: background-color 0.4s, border-color 0.4s;
        }
        .navbar-brand { color: var(--text-main) !important; font-weight: 700; letter-spacing: 0.5px; }
        .brand-icon { color: #3b82f6; text-shadow: 0 0 10px var(--primary-glow); }

        /* --- KARTY --- */
        .card { 
            border: 1px solid var(--border-color); border-radius: 20px; background: var(--card-bg);
            box-shadow: 0 10px 40px var(--shadow-color); transition: all 0.4s ease;
        }
        .card-header { border-radius: 20px 20px 0 0 !important; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85em; padding: 1.2rem; border-bottom: none; }
        .header-primary { background: linear-gradient(135deg, #3b82f6, #0ea5e9); color: white; }
        .header-dark { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }

        /* --- INPUTY I PRZYCISKI --- */
        .form-control, .form-select { 
            border-radius: 12px; border: 1px solid var(--border-color); padding: 0.75rem 1rem; 
            background-color: var(--input-bg); color: var(--text-main); font-size: 0.95em; transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); border-color: #3b82f6; background-color: var(--card-bg); color: var(--text-main); }
        .input-group-text { border-radius: 12px 0 0 12px; border: 1px solid var(--border-color); border-right: none; background: var(--input-bg); color: var(--text-main); transition: all 0.3s ease;}
        
        .btn { border-radius: 12px; font-weight: 600; padding: 0.6rem 1.2rem; transition: all 0.2s; letter-spacing: 0.5px; }
        .btn:hover { transform: translateY(-2px); }

        /* --- TABELA --- */
        .table-responsive { max-height: 65vh; overflow-y: auto; border-radius: 12px; }
        .table { margin-bottom: 0; color: var(--text-main); }
        .table thead th { background-color: var(--input-bg); border-bottom: 2px solid var(--border-color); color: #64748b; text-transform: uppercase; font-size: 0.75em; padding: 1rem; position: sticky; top: 0; z-index: 10; transition: background-color 0.4s; }
        
        .sortable { cursor: pointer; transition: color 0.2s; }
        .sortable:hover { color: #3b82f6; }
        
        .table tbody td { vertical-align: middle; font-size: 0.9em; padding: 1rem 0.5rem; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .table-hover tbody tr:nth-of-type(odd) td { background-color: var(--table-zebra); } 
        .table-hover tbody tr:hover td { background-color: var(--table-hover); }
        
        .powod-text { max-width: 180px; font-size: 0.85em; color: #ef4444; font-style: italic; line-height: 1.3; }
        .price-tag { color: #0ea5e9; font-weight: 700; font-family: monospace; font-size: 1.1em;}

        /* --- SOFT BADGES --- */
        .badge { padding: 0.6em 1em; font-size: 0.75em; border-radius: 8px; font-weight: 700; letter-spacing: 0.3px; display: inline-block; width: 100%; text-align: center;}
        .badge-soft-secondary { background-color: rgba(148, 163, 184, 0.15); color: #64748b; } 
        .badge-soft-warning { background-color: rgba(245, 158, 11, 0.15); color: #d97706; } 
        .badge-soft-primary { background-color: rgba(59, 130, 246, 0.15); color: #2563eb; } 
        .badge-soft-success { background-color: rgba(34, 197, 94, 0.15); color: #16a34a; } 
        .badge-soft-danger { background-color: rgba(239, 68, 68, 0.15); color: #dc2626; } 
        
        body.dark-mode .badge-soft-secondary { color: #94a3b8; }
        body.dark-mode .badge-soft-primary { color: #60a5fa; }
        body.dark-mode .badge-soft-success { color: #4ade80; }
        body.dark-mode .badge-soft-warning { color: #fbbf24; }

        /* --- GRID ILOŚCI --- */
        .qty-container { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; max-width: 80px; margin: 0 auto; }
        .qty-val { text-align: right; font-size: 1.1em; }
        .unit-box { text-align: left; }
        .badge-unit { font-size: 0.75em; background: var(--unit-bg); color: var(--text-main); padding: 3px 6px; border-radius: 6px; font-weight: 600; display: inline-block; transition: background 0.4s;}
        .editable-qty { cursor: pointer; text-decoration: underline dashed #cbd5e1; font-size: 1.1em; padding: 2px 6px; border-radius: 6px; transition: all 0.2s;}
        .editable-qty:hover { color: #3b82f6; text-decoration: underline solid #3b82f6; background: rgba(59,130,246,0.1); }

        .row-urgent { background-color: rgba(239, 68, 68, 0.04) !important; border-left: 4px solid var(--urgent-red) !important; }
        body.dark-mode .row-urgent { background-color: rgba(239, 68, 68, 0.1) !important; }
        .badge-urgent { background-color: var(--urgent-red); color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.7em; animation: pulseUrgent 2s infinite; margin-right: 8px;}

        /* --- STATYSTYKI --- */
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 15px 20px; box-shadow: 0 4px 15px var(--shadow-color); display: flex; align-items: center; gap: 15px; border: 1px solid var(--border-color); transition: transform 0.2s, background 0.4s;}
        .stat-card:hover { transform: translateY(-2px); }
        .stat-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.3em; }
        .stat-value { font-size: 1.5em; font-weight: 700; line-height: 1; color: var(--text-main);}
        .stat-label { font-size: 0.75em; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 1050; }
        .custom-toast { background: var(--card-bg); border-radius: 12px; padding: 15px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 4px solid #10b981; border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);}
        .custom-toast.show { transform: translateX(0); }

        .skeleton-box { height: 20px; background: var(--skeleton-grad); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; opacity: 0.7; animation: fadeInUp 0.4s ease; }
        .empty-state i { font-size: 4rem; display: block; margin-bottom: 1rem; }

        .archive-hidden { display: none !important; }
        .filters-wrapper { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-color); transition: all 0.4s;}
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--input-bg); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

<div id="toastContainer">
    <div id="actionToast" class="custom-toast">
        <i class="bi bi-check-circle-fill text-success fs-4"></i>
        <div class="fw-bold" style="color: var(--text-main);" id="toastMessage">Akcja wykonana pomyślnie!</div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-glass fixed-top py-3">
    <div class="container-fluid px-4">
        <span class="navbar-brand fs-5">
            <i class="bi bi-hexagon-fill brand-icon me-2"></i> SYSTEM ZAMÓWIEŃ <span class="text-primary">TPV</span>
        </span>
        
        <div id="logoutBar" class="view-section ms-auto">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold small opacity-75" id="userGreeting"></span>
                
                <button class="btn btn-sm btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center" onclick="toggleDarkMode()" id="darkModeBtn" title="Przełącz motyw" style="width: 36px; height: 36px;">
                    <i class="bi bi-moon-stars"></i>
                </button>
                
                <button class="btn btn-sm btn-outline-danger fw-bold rounded-pill px-3" onclick="logout()">
                    <i class="bi bi-power"></i> Wyloguj
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 pb-5">

    <div id="view-login" class="view-section active-view card mx-auto mt-5" style="max-width: 420px;">
        <div class="card-header header-dark text-center py-4">
            <div class="mb-2" style="animation: pulseGlow 2s infinite; display: inline-block; border-radius: 50%;">
                <i class="bi bi-fingerprint fs-1 text-info"></i>
            </div>
            <h5 class="mb-0 mt-2 fw-bold text-white">AUTORYZACJA</h5>
        </div>
        <div class="card-body p-4 pt-5 text-center">
            <form id="loginForm">
                <div class="input-group shadow-sm mb-3">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" id="loginInput" class="form-control" placeholder="Identyfikator" required autocomplete="username">
                </div>
                <div class="input-group shadow-sm mb-3">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" id="passInput" class="form-control" placeholder="Hasło" required autocomplete="current-password">
                </div>
                
                <div class="form-check text-start mb-4 ms-1">
                    <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                    <label class="form-check-label small fw-bold" style="color: var(--text-main); opacity: 0.8;" for="rememberMe">
                        Zapamiętaj mnie
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fs-6 shadow-sm">ZALOGUJ SIĘ</button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card mx-auto mb-4" style="max-width: 900px;">
        <div class="card-header header-primary py-3 d-flex align-items-center">
            <i class="bi bi-plus-circle-dotted fs-5 me-2"></i> Formularz Nowego Zapotrzebowania
        </div>
        <div class="card-body p-4 p-md-5">
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="row g-4">
                    <div class="col-md-5">
                        <label class="form-label fw-bold text-muted small">PRODUKT / NAZWA RZECZY</label>
                        <input type="text" id="produkt" class="form-control" placeholder="Wpisz nazwę..." required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted small">STREFA</label>
                        <select id="strefa" class="form-select" required>
                            <option value="" disabled selected>Wybierz...</option>
                            <option value="OCR">OCR</option>
                            <option value="LCM">LCM</option>
                            <option value="LCDR">LCDR</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted small">ILOŚĆ & JEDN.</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <input type="number" id="ilosc" class="form-control text-center text-primary fw-bold" min="1" value="1" required style="min-width: 60px;">
                            <select id="jednostka" class="form-select fw-bold text-secondary px-2" style="width: auto;">
                                <option value="PCS">PCS</option><option value="BOX">BOX</option><option value="ML">ML</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted small text-danger">PRIORYTET</label>
                        <select id="priorytet" class="form-select fw-bold">
                            <option value="Normalny">Normal</option><option value="PILNE">🔥 PILNE</option>
                        </select>
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted small">SZACOWANA CENA (PLN)</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <span class="input-group-text"><i class="bi bi-currency-exchange"></i></span>
                            <input type="number" id="cena" class="form-control" placeholder="Np. 150">
                        </div>
                    </div>
                    <div class="col-md-9">
                        <label class="form-label fw-bold text-muted small">LINK DO SKLEPU</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <span class="input-group-text"><i class="bi bi-link-45deg text-primary"></i></span>
                            <input type="url" id="link" class="form-control" placeholder="Wklej pełny adres URL (https://...)" required>
                        </div>
                    </div>
                    <div class="col-12 mt-4 pt-2 border-top text-end">
                        <button type="submit" class="btn btn-success px-5 py-2 fs-6 shadow-sm">
                            Wyślij zapotrzebowanie <i class="bi bi-send ms-2"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card shadow-sm mb-5">
        <div class="card-header header-dark d-flex justify-content-between align-items-center py-3 px-4">
            <span class="fs-6"><i class="bi bi-database me-2"></i> Baza Zgłoszeń</span>
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch text-white mb-0 me-2">
                    <input class="form-check-input" type="checkbox" id="archiveSwitch" onchange="toggleArchive()">
                    <label class="form-check-label small fw-bold" for="archiveSwitch">Pokaż Archiwum</label>
                </div>
                <button class="btn btn-sm btn-light text-dark fw-bold rounded-pill px-3 shadow-sm" onclick="loadData()">
                    <i class="bi bi-arrow-clockwise text-primary"></i> Odśwież
                </button>
            </div>
        </div>
        
        <div class="card-body p-4 rounded-bottom" style="background-color: transparent;">
            
            <div class="row g-3 mb-3" id="statsDashboard">
                <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-hourglass-split"></i></div><div><div class="stat-value" id="stat-oczekujace">0</div><div class="stat-label">Do akceptacji</div></div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-cart-check"></i></div><div><div class="stat-value" id="stat-zaakceptowane">0</div><div class="stat-label">Do Kupienia</div></div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-truck"></i></div><div><div class="stat-value" id="stat-zamowione">0</div><div class="stat-label">W Drodze</div></div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-box-seam"></i></div><div><div class="stat-value" id="stat-dostarczone">0</div><div class="stat-label">Zakończone</div></div></div></div>
            </div>

            <div class="progress mb-4 shadow-sm" style="height: 6px; border-radius: 10px; background-color: var(--input-bg);">
                <div id="pb-oczek" class="progress-bar bg-secondary" style="width: 0%" title="Oczekujące"></div>
                <div id="pb-w-trakcie" class="progress-bar bg-primary" style="width: 0%" title="Zaakceptowane i Zamówione"></div>
                <div id="pb-dost" class="progress-bar bg-success" style="width: 0%" title="Dostarczone"></div>
            </div>

            <div class="filters-wrapper d-flex flex-wrap justify-content-between align-items-center gap-3 shadow-sm border-0">
                <div class="d-flex gap-2 flex-wrap" id="statusFilters">
                    <span class="text-secondary small fw-bold mt-2 me-2 d-none d-md-block"><i class="bi bi-funnel"></i> FILTRY:</span>
                    <button class="btn btn-dark btn-sm active rounded-pill px-3" onclick="filterByStatus('wszystkie', this)">Wszystkie</button>
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 border-0 bg-secondary bg-opacity-10" onclick="filterByStatus('oczekujące', this)">Oczekujące</button>
                    <button class="btn btn-outline-warning btn-sm rounded-pill px-3 border-0 bg-warning bg-opacity-10" onclick="filterByStatus('zaakceptowane', this)">Zaakceptowane</button>
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3 border-0 bg-primary bg-opacity-10" onclick="filterByStatus('zamówione', this)">Zamówione</button>
                </div>
                <div class="input-group search-container shadow-sm" style="max-width: 280px;">
                    <span class="input-group-text border-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control border-0" placeholder="Szukaj po nazwie...">
                </div>
            </div>

            <div class="table-responsive border shadow-sm" style="background-color: var(--card-bg); border-color: var(--border-color) !important;">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="text-center" style="width: 50px;">#</th>
                            <th class="sortable" onclick="sortData('produkt')" style="min-width: 250px;">Produkt <i class="bi bi-chevron-expand"></i></th>
                            <th class="text-center sortable" onclick="sortData('strefa')">Strefa <i class="bi bi-chevron-expand"></i></th>
                            <th class="text-center sortable" onclick="sortData('ilosc')" style="min-width: 110px;">Ilość <i class="bi bi-chevron-expand"></i></th>
                            <th class="text-center sortable" onclick="sortData('cena')">Cena <i class="bi bi-chevron-expand"></i></th>
                            <th class="text-center sortable" onclick="sortData('dataZam')">Data Zgłoszenia <i class="bi bi-chevron-expand"></i></th>
                            <th class="text-center">Zgłasza</th>
                            <th class="text-center">Sklep</th>
                            <th class="text-center sortable" onclick="sortData('status')" style="min-width: 140px;">Status <i class="bi bi-chevron-expand"></i></th>
                            <th style="min-width: 140px;">Uwagi</th>
                            <th class="text-center" style="min-width: 130px;">Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaocet4gWbk0cF7xe2gYxBNjVK18gxQACz_PB_KZfmojoztuggqChtmJX8qAEBMXGsfw/exec'; 
    
    let currentRole = 'none';
    let currentUser = '';
    let showArchive = false; 
    let globalData = []; 
    let sortCol = '';
    let sortAsc = true;

    const users = {
        'lider lcm': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCM' },
        'lider lcdr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCDR' },
        'lider ocr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider OCR' },
        'kierownik': { haslo: 'tpv12345!', rola: 'kierownik', nazwa: 'Kierownik' },
        'łukasz': { haslo: 'tpv12345!', rola: 'lukasz', nazwa: 'Łukasz' }
    };

    window.onload = () => {
        // DARK MODE CHECK
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').innerHTML = '<i class="bi bi-sun"></i>';
        }

        // POBIERZ SESJĘ LUB LOCALSTORAGE
        const r = localStorage.getItem('userRole') || sessionStorage.getItem('userRole');
        const u = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
        if (r && u) setupInterface(r, u);
    };

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('darkModeBtn').innerHTML = isDark ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputLogin = document.getElementById('loginInput').value.trim().toLowerCase();
        const pass = document.getElementById('passInput').value;
        const remember = document.getElementById('rememberMe').checked;

        if (users[inputLogin] && users[inputLogin].haslo === pass) {
            const rola = users[inputLogin].rola;
            const ladnaNazwa = users[inputLogin].nazwa;
            
            if (remember) {
                localStorage.setItem('userRole', rola);
                localStorage.setItem('userLogin', ladnaNazwa);
            } else {
                sessionStorage.setItem('userRole', rola);
                sessionStorage.setItem('userLogin', ladnaNazwa);
            }
            
            setupInterface(rola, ladnaNazwa);
            showToast('Zalogowano pomyślnie!', 'success');
        } else {
            const card = document.getElementById('view-login');
            card.style.transform = 'translateX(-10px)';
            setTimeout(() => card.style.transform = 'translateX(10px)', 100);
            setTimeout(() => card.style.transform = 'translateX(0)', 200);
            showToast('Błędny identyfikator lub hasło!', 'danger');
        }
    });

    function setupInterface(role, login) {
        currentRole = role; currentUser = login;
        document.querySelectorAll('.view-section').forEach(el => { el.classList.remove('active-view'); });
        
        document.getElementById('logoutBar').classList.add('active-view');
        document.getElementById('userGreeting').innerHTML = `<i class="bi bi-person-circle text-primary"></i> ${login}`;
        
        document.getElementById('view-table').classList.add('active-view');
        if (currentRole === 'lider') document.getElementById('view-lider').classList.add('active-view');
        loadData();
    }

    function logout() { 
        localStorage.removeItem('userRole'); 
        localStorage.removeItem('userLogin'); 
        sessionStorage.removeItem('userRole'); 
        sessionStorage.removeItem('userLogin'); 
        location.reload(); 
    }

    function showToast(msg, type='success') {
        const toast = document.getElementById('actionToast');
        const msgEl = document.getElementById('toastMessage');
        const icon = toast.querySelector('i');
        msgEl.innerText = msg;
        toast.style.borderLeftColor = type === 'danger' ? '#ef4444' : '#10b981';
        icon.className = type === 'danger' ? 'bi bi-x-circle-fill text-danger fs-4' : 'bi bi-check-circle-fill text-success fs-4';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => { showToast('Skopiowano link do schowka!'); });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; 
            return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()}`; 
        } catch (e) { return dateStr; }
    }

    function toggleArchive() { showArchive = document.getElementById('archiveSwitch').checked; renderTable(globalData); }

    function sortData(key) {
        if(sortCol === key) sortAsc = !sortAsc;
        else { sortCol = key; sortAsc = true; }

        globalData.sort((a, b) => {
            let valA = a[key] !== undefined ? a[key] : '';
            let valB = b[key] !== undefined ? b[key] : '';

            if(key === 'ilosc' || key === 'cena') {
                valA = parseFloat(valA) || 0; valB = parseFloat(valB) || 0;
            } else if(key === 'dataZam') {
                valA = new Date(valA).getTime() || 0; valB = new Date(valB).getTime() || 0;
            } else {
                valA = String(valA).toLowerCase(); valB = String(valB).toLowerCase();
            }

            if(valA < valB) return sortAsc ? -1 : 1;
            if(valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });
        renderTable(globalData, false); 
    }

    async function editQty(id, oldQty, btnElement) {
        const newQty = prompt("Wpisz nową ilość:", oldQty);
        if (newQty && newQty != oldQty) {
            const row = btnElement.closest('tr');
            const qtyValCell = row.querySelector('.qty-val');
            qtyValCell.innerHTML = '<span class="spinner-border spinner-border-sm text-primary"></span>';
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'edit', id: id, newQty: newQty }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                qtyValCell.innerText = newQty;
                btnElement.setAttribute('onclick', `editQty(${id}, ${newQty}, this)`);
                let rowData = globalData.find(r => r.id === id);
                if(rowData) rowData.ilosc = newQty;
                showToast('Zaktualizowano ilość!');
            } catch(e) {
                showToast('Błąd aktualizacji', 'danger');
                qtyValCell.innerText = oldQty;
            }
        }
    }

    async function submitOrder(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Wysyłanie...';

        const data = {
            action: 'add', produkt: document.getElementById('produkt').value, strefa: document.getElementById('strefa').value,
            ilosc: document.getElementById('ilosc').value, jednostka: document.getElementById('jednostka').value,
            link: document.getElementById('link').value, kto: currentUser,
            priorytet: document.getElementById('priorytet').value, cena: document.getElementById('cena').value 
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
            e.target.reset(); showToast('Zapotrzebowanie zostało wysłane!'); loadData(); 
            document.getElementById('view-table').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (error) { showToast('Błąd wysyłania', 'danger'); } 
        finally { btn.disabled = false; btn.innerHTML = originalText; }
    }

    async function loadData() {
        const tbody = document.getElementById('ordersTableBody');
        let skeletonHtml = '';
        for(let i=0; i<6; i++) skeletonHtml += `<tr><td colspan="11" class="py-3"><div class="skeleton-box"></div></td></tr>`;
        tbody.innerHTML = skeletonHtml;
        
        try {
            const response = await fetch(SCRIPT_URL);
            globalData = await response.json();
            renderTable(globalData, true); 
            
            document.getElementById('searchInput').value = "";
            const allBtn = document.querySelector('#statusFilters button');
            if(allBtn && !document.getElementById('searchInput').value) filterByStatus('wszystkie', allBtn);
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="11" class="text-danger text-center py-5 fw-bold">Błąd połączenia z bazą Google.</td></tr>';
        }
    }

    function renderTable(dataArray, applyReverse = false) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';
        
        let statOczek = 0, statZaakc = 0, statZamow = 0, statDost = 0;
        let displayData = applyReverse ? [...dataArray].reverse() : dataArray;
        let visibleCount = 0;

        displayData.forEach(row => { 
            if (row.status === 'Oczekujące') statOczek++;
            if (row.status === 'Zaakceptowane') statZaakc++;
            if (row.status === 'Zamówione') statZamow++;
            if (row.status === 'Dostarczone') statDost++;

            if (!showArchive && row.status === 'Dostarczone') return;
            visibleCount++;

            let tr = document.createElement('tr');
            tr.setAttribute('data-status', row.status.toLowerCase());
            if (row.priorytet === 'PILNE') tr.className = 'row-urgent';
            
            const czyToWlasciciel = row.kto && currentUser && (row.kto.toLowerCase() === currentUser.toLowerCase());
            let actionButtons = '-';

            if (currentRole === 'kierownik' && row.status === 'Oczekujące') {
                actionButtons = `<button class="btn btn-sm btn-success w-100 mb-1 rounded-pill shadow-sm" onclick="updateStatus(${row.id}, 'Zaakceptowane', '', this)">Akceptuj</button>
                                 <button class="btn btn-sm btn-outline-danger w-100 rounded-pill shadow-sm" style="background:var(--card-bg);" onclick="rejectOrder(${row.id}, this)">Odrzuć</button>`;
            } else if (currentRole === 'lider' && row.status === 'Oczekujące' && czyToWlasciciel) {
                actionButtons = `
                    <button class="btn btn-sm btn-outline-primary w-100 mb-1 rounded-pill shadow-sm" onclick="editQty(${row.id}, ${row.ilosc}, this)"><i class="bi bi-pencil-square"></i> Edytuj</button>
                    <button class="btn btn-sm btn-outline-danger w-100 rounded-pill shadow-sm mb-1" onclick="deleteOrder(${row.id}, this)"><i class="bi bi-trash"></i> Usuń</button>
                `;
            } else if (currentRole === 'lukasz' && row.status === 'Zaakceptowane') {
                actionButtons = `<button class="btn btn-sm btn-primary w-100 rounded-pill shadow-sm" onclick="updateStatus(${row.id}, 'Zamówione', '', this)">Kupione</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zamówione') {
                actionButtons = `<button class="btn btn-sm btn-info w-100 text-white rounded-pill shadow-sm" onclick="updateStatus(${row.id}, 'Dostarczone', '', this)" style="box-shadow: 0 4px 10px rgba(13, 202, 240, 0.4);"><i class="bi bi-box-seam"></i> Odbiór</button>`;
            }

            let sClass = "badge-soft-secondary";
            if(row.status === 'Zaakceptowane') sClass = "badge-soft-warning";
            if(row.status === 'Zamówione') sClass = "badge-soft-primary";
            if(row.status === 'Dostarczone') sClass = "badge-soft-success";
            if(row.status === 'Odrzucone') sClass = "badge-soft-danger";

            const pBadge = row.priorytet === 'PILNE' ? '<span class="badge-urgent">PILNE</span>' : '';
            const cenaWidok = row.cena ? `<span class="price-tag">${row.cena} zł</span>` : '-';
            
            const qtyHtml = `<div class="qty-container">
                                <div class="qty-val fw-bold text-primary">${row.ilosc}</div>
                                <div class="unit-box"><span class="badge-unit">${row.jednostka || 'PCS'}</span></div>
                             </div>`;

            tr.innerHTML = `
                <td class="text-center text-muted small">${row.id-1}</td>
                <td><div class="d-flex align-items-center">${pBadge}<span class="fw-bolder" style="font-size: 1.05em;">${row.produkt}</span></div></td>
                <td class="text-center"><span class="badge" style="background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color);">${row.strefa}</span></td>
                <td class="text-center">${qtyHtml}</td>
                <td class="text-center">${cenaWidok}</td>
                <td class="text-center align-middle text-muted small fw-medium">${formatDate(row.dataZam)}</td>
                <td class="text-center small text-muted"><i class="bi bi-person text-secondary me-1"></i>${row.kto}</td>
                <td class="text-center">
                    <div class="btn-group shadow-sm">
                        <a href="${row.link}" target="_blank" class="btn btn-sm btn-light border text-primary"><i class="bi bi-box-arrow-up-right"></i> Sklep</a>
                        <button class="btn btn-sm btn-light border text-secondary px-2" onclick="copyToClipboard('${row.link}')" title="Kopiuj link"><i class="bi bi-clipboard"></i></button>
                    </div>
                </td>
                <td class="text-center"><span class="badge ${sClass}">${row.status}</span></td>
                <td class="powod-text small">${row.powod}</td>
                <td class="text-center align-middle px-2">${actionButtons}</td>
            `;
            tbody.appendChild(tr);
        });

        if(visibleCount === 0) {
            tbody.innerHTML = `<tr id="emptyStateRow"><td colspan="11" class="empty-state">
                <i class="bi bi-inbox text-secondary"></i>
                <h5>Brak zamówień do wyświetlenia</h5>
                <p class="small">Lista jest pusta lub odfiltrowana.</p>
            </td></tr>`;
        }

        document.getElementById('stat-oczekujace').innerText = statOczek;
        document.getElementById('stat-zaakceptowane').innerText = statZaakc;
        document.getElementById('stat-zamowione').innerText = statZamow;
        document.getElementById('stat-dostarczone').innerText = statDost;

        let totalActive = statOczek + statZaakc + statZamow + statDost;
        let pOczek = totalActive ? (statOczek / totalActive * 100) : 0;
        let pWTok = totalActive ? ((statZaakc + statZamow) / totalActive * 100) : 0;
        let pDost = totalActive ? (statDost / totalActive * 100) : 0;

        document.getElementById('pb-oczek').style.width = pOczek + '%';
        document.getElementById('pb-w-trakcie').style.width = pWTok + '%';
        document.getElementById('pb-dost').style.width = pDost + '%';
    }

    function filterByStatus(statusName, btnElement) {
        const buttons = document.querySelectorAll('#statusFilters button');
        buttons.forEach(b => {
            b.classList.remove('btn-dark', 'text-white', 'shadow-sm');
            b.classList.add('bg-opacity-10', 'border-0');
            b.classList.remove('active');
            if(!document.body.classList.contains('dark-mode')) b.classList.add('text-dark');
        });
        
        btnElement.classList.remove('bg-opacity-10', 'text-dark', 'border-0');
        btnElement.classList.add('btn-dark', 'text-white', 'active', 'shadow-sm');

        const rows = document.querySelectorAll('#ordersTableBody tr:not(#emptyStateRow)');
        let visibleCount = 0;
        rows.forEach(row => {
            if(statusName === 'wszystkie') { row.style.display = ""; visibleCount++; } 
            else {
                let match = row.getAttribute('data-status') === statusName;
                row.style.display = match ? "" : "none";
                if(match) visibleCount++;
            }
        });
        checkEmptyState(visibleCount);
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll('#ordersTableBody tr:not(#emptyStateRow)');
        const allBtn = document.querySelector('#statusFilters button:first-child');
        if(allBtn) filterByStatus('wszystkie', allBtn);
        
        let visibleCount = 0;
        rows.forEach(row => { 
            let match = row.innerText.toLowerCase().includes(value);
            row.style.display = match ? "" : "none"; 
            if(match) visibleCount++;
        });
        checkEmptyState(visibleCount);
    });

    function checkEmptyState(count) {
        let emptyRow = document.getElementById('emptyStateRow');
        let tbody = document.getElementById('ordersTableBody');
        if(count === 0) {
            if(!emptyRow) {
                tbody.insertAdjacentHTML('beforeend', `<tr id="emptyStateRow"><td colspan="11" class="empty-state"><i class="bi bi-search text-secondary"></i><h5>Brak wyników</h5><p class="small">Nie znaleziono pasujących rekordów.</p></td></tr>`);
            } else { emptyRow.style.display = ""; }
        } else {
            if(emptyRow) emptyRow.style.display = "none";
        }
    }

    function rejectOrder(idWiersza, btnElement) {
        const powod = prompt("Podaj powód odrzucenia (Będzie widoczny dla Lidera):");
        if (powod) updateStatus(idWiersza, 'Odrzucone', powod, btnElement);
    }

    async function deleteOrder(id, btnElement) {
        if (!confirm('Anulować to zgłoszenie?')) return;
        const row = btnElement.closest('tr'); row.style.opacity = '0.3'; row.style.pointerEvents = 'none';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
            row.remove(); 
            globalData = globalData.filter(r => r.id !== id); 
            showToast('Usunięto pomyślnie!');
            setTimeout(loadData, 500); 
        } catch(e) { showToast('Błąd komunikacji', 'danger'); row.style.opacity = '1'; row.style.pointerEvents = 'auto'; }
    }

    async function updateStatus(id, stat, reason = '', btn) {
        if(stat !== 'Odrzucone' && !confirm(`Potwierdzasz zmianę na: "${stat}"?`)) return;
        const row = btn.closest('tr');
        if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id: id, newStatus: stat, reason: reason }) });
            if (row) {
                let sClass = "badge-soft-secondary";
                if(stat === 'Zaakceptowane') sClass = "badge-soft-warning";
                if(stat === 'Zamówione') sClass = "badge-soft-primary";
                if(stat === 'Dostarczone') sClass = "badge-soft-success";
                if(stat === 'Odrzucone') sClass = "badge-soft-danger";

                row.querySelector('td:nth-child(9)').innerHTML = `<span class="badge ${sClass}">${stat}</span>`;
                row.setAttribute('data-status', stat.toLowerCase());
                if (stat === 'Odrzucone') row.querySelector('td:nth-child(10)').innerText = reason;
                row.querySelector('td:nth-child(11)').innerHTML = '<span class="badge bg-light text-success border border-success"><i class="bi bi-check-all"></i> Gotowe</span>';

                row.style.opacity = '1'; row.style.pointerEvents = 'auto';
                
                let rowData = globalData.find(r => r.id === id);
                if(rowData) { rowData.status = stat; rowData.powod = reason; }

                showToast(`Zmieniono status na: ${stat}`);
                if (stat === 'Dostarczone' && !showArchive) setTimeout(() => row.style.display = 'none', 500);
                setTimeout(() => renderTable(globalData, false), 600); 
            }
        } catch (error) { showToast('Błąd sieci', 'danger'); row.style.opacity = '1'; row.style.pointerEvents = 'auto'; }
    }
</script>
</body>
</html>
