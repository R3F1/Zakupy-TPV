<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień TPV - Dział Techniczny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #e3efff; 
            color: #1a202c;
            font-family: 'Poppins', Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            margin-top: 70px; 
        }
        .navbar-glow {
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        .view-section { display: none; }
        .active-view { display: block; }
        
        /* Karty */
        .card { 
            border: none; 
            border-radius: 16px; 
            background-color: #ffffff;
            box-shadow: 0 5px 20px rgba(14, 165, 233, 0.1); 
            transition: box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: 0 8px 30px rgba(14, 165, 233, 0.2); }
        .card-header { 
            border-radius: 16px 16px 0 0 !important; 
            font-weight: 600; 
            letter-spacing: 0.5px; 
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .btn { border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .btn:hover { transform: translateY(-1px); }
        
        /* Tabela zoptymalizowana */
        .table-responsive { max-height: 65vh; overflow-y: auto; border-radius: 8px; }
        .table { margin-bottom: 0; }
        .table thead th { 
            background-color: #f8fafc; 
            border-bottom: 2px solid #e2e8f0; 
            color: #475569; 
            text-transform: uppercase; 
            font-size: 0.75em; 
            letter-spacing: 0.5px;
            vertical-align: middle;
        }
        .table tbody td { vertical-align: middle; font-size: 0.9em; }
        .table-hover tbody tr:hover { background-color: #f0f9ff; }
        
        /* Elementy tabeli */
        .powod-text { max-width: 180px; font-size: 0.85em; color: #dc3545; font-style: italic; line-height: 1.2; }
        .badge { padding: 0.6em 0.8em; font-size: 0.75em; border-radius: 6px; font-weight: 600; letter-spacing: 0.3px; }
        
        /* Filtry i wyszukiwarka */
        .filters-wrapper { background-color: #f8fafc; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .input-group-search { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .search-input { border: 1px solid #e2e8f0; border-left: none; padding: 10px 15px; }
        .search-icon-btn { border: 1px solid #e2e8f0; border-right: none; background: #ffffff; }
        .search-input:focus { box-shadow: none; border-color: #e2e8f0; }
        
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-glow fixed-top py-2">
    <div class="container-fluid px-4">
        <span class="navbar-brand text-white fw-bold fs-5">
            <i class="bi bi-cart3 me-2"></i> SYSTEM ZAMÓWIEŃ TPV
        </span>
        <div id="logoutBar" class="view-section text-white text-end">
            <span class="me-3 fw-bold small" id="userGreeting"></span>
            <button class="btn btn-sm btn-light text-danger fw-bold shadow-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Wyloguj
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 pb-5">

    <div id="view-login" class="view-section active-view card mx-auto mt-5" style="max-width: 400px;">
        <div class="card-header bg-dark text-white text-center py-4">
            <i class="bi bi-person-circle fs-1 d-block mb-2 text-primary"></i>
            Witaj w Systemie
        </div>
        <div class="card-body p-4">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.75em;">NAZWA UŻYTKOWNIKA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" id="loginInput" class="form-control" placeholder="Np. Kierownik" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.75em;">HASŁO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" id="passInput" class="form-control" placeholder="Wpisz hasło..." required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="loginBtn">
                    Zaloguj się <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card mx-auto mb-4" style="max-width: 800px;">
        <div class="card-header bg-primary text-white py-3">
            <i class="bi bi-plus-circle me-1"></i> Złóż nowe zapotrzebowanie
        </div>
        <div class="card-body p-4">
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="row g-3">
                    <div class="col-md-7">
                        <label class="form-label fw-bold text-muted small">PRODUKT / NAZWA RZECZY</label>
                        <input type="text" id="produkt" class="form-control bg-light" placeholder="Co zamawiasz?" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted small">STREFA / DZIAŁ</label>
                        <select id="strefa" class="form-select bg-light" required>
                            <option value="" disabled selected>Wybierz...</option>
                            <option value="OCR">OCR</option>
                            <option value="LCM">LCM</option>
                            <option value="LCDR">LCDR</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted small">ILOŚĆ</label>
                        <input type="number" id="ilosc" class="form-control bg-light text-center" min="1" value="1" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small">LINK DO SKLEPU</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-link-45deg"></i></span>
                            <input type="url" id="link" class="form-control bg-light" placeholder="Wklej pełny adres URL (https://...)" required>
                        </div>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                            <i class="bi bi-cart-plus me-1"></i> Wyślij do akceptacji
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card shadow-sm mb-5">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
            <span id="table-title" class="fs-6 fw-bold"><i class="bi bi-list-columns-reverse me-2"></i> Baza Zgłoszeń</span>
            <button class="btn btn-sm btn-outline-light" onclick="loadData()">
                <i class="bi bi-arrow-clockwise"></i> Pobierz nowe
            </button>
        </div>
        <div class="card-body p-3">
            
            <div class="filters-wrapper d-flex flex-wrap justify-content-between align-items-center gap-3">
                
                <div class="d-flex gap-2 flex-wrap" id="statusFilters">
                    <span class="text-muted small fw-bold mt-1 me-2 d-none d-md-block">SZYBKI FILTR:</span>
                    <button class="btn btn-dark btn-sm active" onclick="filterByStatus('wszystkie', this)">Wszystkie</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="filterByStatus('oczekujące', this)">Oczekujące</button>
                    <button class="btn btn-outline-warning btn-sm" onclick="filterByStatus('zaakceptowane', this)">Zaakceptowane</button>
                    <button class="btn btn-outline-primary btn-sm" onclick="filterByStatus('zamówione', this)">Zamówione</button>
                    <button class="btn btn-outline-success btn-sm" onclick="filterByStatus('dostarczone', this)">Dostarczone</button>
                </div>

                <div class="input-group input-group-search" style="max-width: 300px;">
                    <span class="input-group-text search-icon-btn text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control search-input text-muted" placeholder="Szukaj produktu lub osoby...">
                </div>
            </div>

            <div class="table-responsive border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sticky-top shadow-sm">
                        <tr>
                            <th class="text-center" style="width: 50px;">L.p.</th>
                            <th style="min-width: 200px;">Produkt</th>
                            <th class="text-center">Strefa</th>
                            <th class="text-center">Ilość</th>
                            <th class="text-center">Data</th>
                            <th class="text-center">Zgłasza</th>
                            <th class="text-center">Link</th>
                            <th class="text-center" style="min-width: 140px;">Status</th>
                            <th>Uwagi / Powód</th>
                            <th class="text-center" style="min-width: 130px;">Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="10" class="text-center text-muted py-5"><div class="spinner-border text-primary mb-3"></div><br>Ładowanie najnowszych danych z chmury...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // TWÓJ LINK Z GOOGLE APPS SCRIPT
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwql25-MnPGsgy5IElCu_EJFvHA9OZpInNOPY47AeJUbaluFidAuKG0x9vGXD9R2SK4hg/exec';
    
    let currentRole = 'none';
    let currentUser = '';

    const users = {
        'lider lcm': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCM' },
        'lider lcdr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCDR' },
        'lider ocr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider OCR' },
        'kierownik': { haslo: 'tpv12345!', rola: 'kierownik', nazwa: 'Kierownik' },
        'łukasz': { haslo: 'tpv12345!', rola: 'lukasz', nazwa: 'Łukasz' }
    };

    window.onload = () => {
        const savedRole = localStorage.getItem('userRole');
        const savedLogin = localStorage.getItem('userLogin');
        if (savedRole && savedLogin) {
            setupInterface(savedRole, savedLogin);
        }
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputLogin = document.getElementById('loginInput').value.trim().toLowerCase();
        const pass = document.getElementById('passInput').value;

        if (users[inputLogin] && users[inputLogin].haslo === pass) {
            const rola = users[inputLogin].rola;
            const ladnaNazwa = users[inputLogin].nazwa;
            
            localStorage.setItem('userRole', rola);
            localStorage.setItem('userLogin', ladnaNazwa);
            setupInterface(rola, ladnaNazwa);
        } else {
            alert('Błędny login lub hasło!');
        }
    });

    function setupInterface(role, login) {
        currentRole = role;
        currentUser = login;
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
        
        document.getElementById('logoutBar').classList.add('active-view');
        document.getElementById('userGreeting').innerHTML = `<i class="bi bi-person-check-fill me-1"></i> Zalogowano: ${login}`;

        document.getElementById('view-table').classList.add('active-view');

        if (currentRole === 'lider') {
            document.getElementById('view-lider').classList.add('active-view');
            document.getElementById('table-title').innerHTML = 'Moje Zgłoszenia i Statusy';
        } else if (currentRole === 'kierownik') {
            document.getElementById('table-title').innerHTML = 'Panel Akceptacji Zamówień';
        } else if (currentRole === 'lukasz') {
            document.getElementById('table-title').innerHTML = 'Panel Realizacji Zakupów';
        }
        
        loadData();
    }

    function logout() {
        localStorage.removeItem('userRole');
        localStorage.removeItem('userLogin');
        location.reload(); 
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        if (typeof dateStr === 'string' && dateStr.includes('.')) return dateStr;
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; 
            return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' }) + '<br><small class="text-muted">' + 
                   d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute:'2-digit' }) + '</small>';
        } catch (e) { return dateStr; }
    }

    async function submitOrder(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Wysyłanie...';

        const data = {
            action: 'add',
            produkt: document.getElementById('produkt').value,
            strefa: document.getElementById('strefa').value,
            ilosc: document.getElementById('ilosc').value,
            link: document.getElementById('link').value,
            kto: currentUser 
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            });
            e.target.reset();
            loadData(); 
        } catch (error) {
            alert('Błąd dodawania: ' + error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    async function loadData() {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-5"><div class="spinner-border text-primary mb-3"></div><br>Odświeżanie danych...</td></tr>';
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            renderTable(data);
            
            // Po załadowaniu danych resetujemy filtry do widoku "Wszystkie"
            document.getElementById('searchInput').value = "";
            const allBtn = document.querySelector('#statusFilters button:first-child');
            filterByStatus('wszystkie', allBtn);
            
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-danger text-center py-4"><i class="bi bi-exclamation-triangle-fill fs-3 d-block mb-2"></i>Błąd pobierania danych z Google.</td></tr>';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-3"></i>Brak zamówień w bazie</td></tr>';
            return;
        }

        // data.reverse() daje najnowsze na górę. Dodajemy licznik do L.p.
        let lpCounter = 1;
        
        data.reverse().forEach(row => { 
            let tr = document.createElement('tr');
            
            // Dodajemy niewidoczny atrybut do filtrowania statusów
            tr.setAttribute('data-status', row.status.toLowerCase());
            
            let actionButtons = '-';
            
            if (currentRole === 'kierownik' && row.status === 'Oczekujące') {
                actionButtons = `
                    <button class="btn btn-sm btn-success w-100 mb-1 shadow-sm" onclick="updateStatus(${row.id}, 'Zaakceptowane')"><i class="bi bi-check-lg"></i> Akceptuj</button>
                    <button class="btn btn-sm btn-outline-danger w-100 shadow-sm bg-white" onclick="rejectOrder(${row.id})"><i class="bi bi-x-lg"></i> Odrzuć</button>
                `;
            } else if (currentRole === 'lukasz' && row.status === 'Zaakceptowane') {
                actionButtons = `<button class="btn btn-sm btn-primary w-100 shadow-sm" onclick="updateStatus(${row.id}, 'Zamówione')"><i class="bi bi-cart-check"></i> Kupione</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zamówione') {
                actionButtons = `<button class="btn btn-sm btn-info w-100 text-white shadow-sm" onclick="updateStatus(${row.id}, 'Dostarczone')"><i class="bi bi-box-seam"></i> Dostarczono</button>`;
            }

            let statusColor = "bg-secondary";
            let statusIcon = "bi-hourglass-split";
            if(row.status === 'Zaakceptowane') { statusColor = "bg-warning text-dark"; statusIcon = "bi-check2-circle"; }
            if(row.status === 'Zamówione') { statusColor = "bg-primary"; statusIcon = "bi-cart-check"; }
            if(row.status === 'Dostarczone') { statusColor = "bg-success"; statusIcon = "bi-box-seam"; }
            if(row.status === 'Odrzucone') { statusColor = "bg-danger"; statusIcon = "bi-x-octagon"; }

            const ladnaData = formatDate(row.dataZam);

            tr.innerHTML = `
                <td class="text-center text-muted fw-bold small">${lpCounter++}</td>
                <td class="fw-bold text-primary-emphasis">${row.produkt}</td>
                <td class="text-center"><span class="badge border border-secondary text-secondary bg-light">${row.strefa}</span></td>
                <td class="text-center fw-bold fs-6">${row.ilosc}</td>
                <td class="text-center align-middle">${ladnaData}</td>
                <td class="text-center small"><i class="bi bi-person text-muted me-1"></i>${row.kto}</td>
                <td class="text-center"><a href="${row.link}" target="_blank" class="btn btn-sm btn-light border text-primary"><i class="bi bi-box-arrow-up-right"></i> Sklep</a></td>
                <td class="text-center"><span class="badge ${statusColor} w-100 py-2"><i class="bi ${statusIcon} me-1"></i>${row.status}</span></td>
                <td><div class="powod-text">${row.powod}</div></td>
                <td class="text-center align-middle">${actionButtons}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- FILTROWANIE PO PRZYCISKACH (STATUSY) ---
    function filterByStatus(statusName, btnElement) {
        // Zmiana stylów przycisków
        const buttons = document.querySelectorAll('#statusFilters button');
        buttons.forEach(b => {
            b.classList.remove('btn-dark', 'text-white');
            b.classList.add('btn-outline-' + b.classList[1].split('-')[2]); // powrót do outline
            if(b.classList.contains('active')) b.classList.remove('active');
        });
        
        // Zaznaczony przycisk
        btnElement.classList.remove(/btn-outline-[a-z]+/);
        btnElement.classList.add('btn-dark', 'text-white', 'active');

        // Logika pokazywania wierszy
        const rows = document.querySelectorAll('#ordersTableBody tr');
        rows.forEach(row => {
            if(statusName === 'wszystkie') {
                row.style.display = "";
            } else {
                const rowStatus = row.getAttribute('data-status');
                if(rowStatus === statusName) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            }
        });
    }

    // --- WYSZUKIWANIE TEKSTOWE ---
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll('#ordersTableBody tr');
        
        // Resetujemy przyciski filtrów na "Wszystkie"
        const allBtn = document.querySelector('#statusFilters button:first-child');
        filterByStatus('wszystkie', allBtn);

        rows.forEach(row => {
            const textContent = row.innerText.toLowerCase();
            row.style.display = textContent.includes(value) ? "" : "none";
        });
    });

    function rejectOrder(idWiersza) {
        const powod = prompt("Podaj powód odrzucenia (Wymagane):");
        if (powod === null) return; 
        if (powod.trim() === "") { alert("Musisz podać powód!"); return; }
        updateStatus(idWiersza, 'Odrzucone', powod);
    }

    // --- ZMIANA STATUSU BEZ PRZEŁADOWANIA CAŁEJ STRONY ---
    async function updateStatus(idWiersza, newStatus, reason = '') {
        if(newStatus !== 'Odrzucone' && !confirm(`Zmienić status na: "${newStatus}"?`)) return;

        let clickedRow;
        const rows = document.querySelectorAll('#ordersTableBody tr');
        rows.forEach(tr => {
            const btn = tr.querySelector(`button[onclick*="updateStatus(${idWiersza}"]`) || tr.querySelector(`button[onclick*="rejectOrder(${idWiersza})"]`);
            if (btn) clickedRow = tr;
        });

        if (clickedRow) {
            clickedRow.style.opacity = '0.4';
            clickedRow.style.pointerEvents = 'none'; 
        }

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', id: idWiersza, newStatus: newStatus, reason: reason }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            
            if (clickedRow) {
                const statusCell = clickedRow.querySelector('td:nth-child(8)');
                
                let statusColor = "bg-secondary";
                let statusIcon = "bi-hourglass-split";
                if(newStatus === 'Zaakceptowane') { statusColor = "bg-warning text-dark"; statusIcon = "bi-check2-circle"; }
                if(newStatus === 'Zamówione') { statusColor = "bg-primary"; statusIcon = "bi-cart-check"; }
                if(newStatus === 'Dostarczone') { statusColor = "bg-success"; statusIcon = "bi-box-seam"; }
                if(newStatus === 'Odrzucone') { statusColor = "bg-danger"; statusIcon = "bi-x-octagon"; }

                statusCell.innerHTML = `<span class="badge ${statusColor} w-100 py-2"><i class="bi ${statusIcon} me-1"></i>${newStatus}</span>`;
                
                // Uaktualnij ukryty atrybut statusu, by filtry nadal działały
                clickedRow.setAttribute('data-status', newStatus.toLowerCase());

                if (newStatus === 'Odrzucone') {
                    const reasonCell = clickedRow.querySelector('td:nth-child(9) .powod-text');
                    if(reasonCell) reasonCell.innerText = reason;
                }

                const actionCell = clickedRow.querySelector('td:nth-child(10)');
                actionCell.innerHTML = '<span class="badge bg-light text-success border border-success w-100 py-2"><i class="bi bi-check-all"></i> OK</span>';

                clickedRow.style.opacity = '1';
                clickedRow.style.pointerEvents = 'auto';
            } else {
                loadData();
            }
        } catch (error) {
            alert('Błąd serwera: ' + error);
            if (clickedRow) {
                clickedRow.style.opacity = '1';
                clickedRow.style.pointerEvents = 'auto';
            }
        }
    }
</script>
</body>
</html>
