<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień Wewnętrznych</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .view-section { display: none; }
        .active-view { display: block; }
        .table-responsive { max-height: 600px; overflow-y: auto; }
        /* Drobny styl, żeby długie powody zawijały się w tabeli */
        .powod-text { max-width: 200px; white-space: normal; font-size: 0.85em; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid mt-4 px-4 pb-5">
    <h2 class="mb-4 text-center">System Zamówień - Dział Techniczny</h2>

    <div id="logoutBar" class="text-end mb-3 view-section">
        <span class="me-3 fw-bold" id="userGreeting"></span>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">Wyloguj</button>
    </div>

    <div id="view-login" class="view-section active-view card mx-auto shadow-sm" style="max-width: 400px;">
        <div class="card-header bg-dark text-white text-center">Logowanie do systemu</div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Nazwa użytkownika</label>
                    <input type="text" id="loginInput" class="form-control" placeholder="Np. Lider LCM" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hasło</label>
                    <input type="password" id="passInput" class="form-control" placeholder="Wpisz hasło..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">Zaloguj się</button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card shadow-sm mx-auto mb-4" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">Panel Lidera - Nowe Zamówienie</div>
        <div class="card-body">
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="mb-3">
                    <label class="form-label">Produkt</label>
                    <input type="text" id="produkt" class="form-control" placeholder="Nazwa zamawianej rzeczy" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Strefa</label>
                    <select id="strefa" class="form-select" required>
                        <option value="" disabled selected>Wybierz strefę...</option>
                        <option value="OCR">OCR</option>
                        <option value="LCM">LCM</option>
                        <option value="LCDR">LCDR</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ilość</label>
                    <input type="number" id="ilosc" class="form-control" min="1" value="1" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Link</label>
                    <input type="url" id="link" class="form-control" placeholder="https://..." required>
                </div>
                <button type="submit" class="btn btn-success w-100">Dodaj do listy zamówień</button>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <span id="table-title">Baza Zgłoszeń</span>
            <button class="btn btn-sm btn-outline-light" onclick="loadData()">Odśwież listę</button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>Produkt</th>
                            <th>Strefa</th>
                            <th>Ilość</th>
                            <th>Data</th>
                            <th>Kto</th>
                            <th>Link</th>
                            <th>Status</th>
                            <th>Uwagi / Powód</th>
                            <th>Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="9" class="text-center text-muted py-3">Ładowanie danych...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // TWÓJ LINK Z GOOGLE APPS SCRIPT
    // ==========================================
   const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmcUfWAvqPCiTzt55VSCZM_tVJJShRTAL28JT6nINYQSFBGVFEVSzLi3plClmmwE65jg/exec';
    
    let currentRole = 'none';
    let currentUser = '';

    const users = {
        'lider lcm': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCM' },
        'lider lcdr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCDR' },
        'lider ocr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider OCR' },
        'kierownik': { haslo: 'tpv12345!', rola: 'kierownik', nazwa: 'Kierownik' },
        'łukasz': { haslo: 'tpv12345!', rola: 'lukasz', nazwa: 'Łukasz' }
    };

    window.onload = () => {
        const savedRole = localStorage.getItem('userRole');
        const savedLogin = localStorage.getItem('userLogin');
        if (savedRole && savedLogin) {
            setupInterface(savedRole, savedLogin);
        }
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputLogin = document.getElementById('loginInput').value.trim().toLowerCase();
        const pass = document.getElementById('passInput').value;

        if (users[inputLogin] && users[inputLogin].haslo === pass) {
            const rola = users[inputLogin].rola;
            const ladnaNazwa = users[inputLogin].nazwa;
            
            localStorage.setItem('userRole', rola);
            localStorage.setItem('userLogin', ladnaNazwa);
            setupInterface(rola, ladnaNazwa);
        } else {
            alert('Błędny login lub hasło!');
        }
    });

    function setupInterface(role, login) {
        currentRole = role;
        currentUser = login;
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
        
        document.getElementById('logoutBar').classList.add('active-view');
        document.getElementById('userGreeting').innerText = `Zalogowano: ${login}`;

        // UWAGA: Tabela (view-table) jest teraz aktywna dla KAŻDEGO
        document.getElementById('view-table').classList.add('active-view');

        // Formularz (view-lider) aktywny tylko dla liderów
        if (currentRole === 'lider') {
            document.getElementById('view-lider').classList.add('active-view');
            document.getElementById('table-title').innerText = 'Lista wszystkich zamówień';
        } else if (currentRole === 'kierownik') {
            document.getElementById('table-title').innerText = 'Panel Akceptacji - Kierownik';
        } else if (currentRole === 'lukasz') {
            document.getElementById('table-title').innerText = 'Panel Realizacji - Łukasz';
        }
        
        loadData();
    }

    function logout() {
        localStorage.removeItem('userRole');
        localStorage.removeItem('userLogin');
        location.reload(); 
    }

    // --- WYSYŁANIE ZAMÓWIENIA ---
    async function submitOrder(e) {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Wysyłanie...";

        const data = {
            action: 'add',
            produkt: document.getElementById('produkt').value,
            strefa: document.getElementById('strefa').value,
            ilosc: document.getElementById('ilosc').value,
            link: document.getElementById('link').value,
            kto: currentUser 
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            });
            alert('Dodano zamówienie!');
            e.target.reset();
            loadData(); // Odśwież tabelę automatycznie po dodaniu
        } catch (error) {
            alert('Błąd: ' + error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Dodaj do listy zamówień";
        }
    }

    // --- POBIERANIE DANYCH ---
    async function loadData() {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '<tr><td colspan="9" class="text-center py-3">Ładowanie z serwera...</td></tr>';
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-danger text-center py-3">Błąd pobierania danych. Zaktualizowałeś Apps Script?</td></tr>';
            console.error(error);
        }
    }

    // --- GENEROWANIE TABELI ---
    function renderTable(data) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-3">Brak zamówień w bazie</td></tr>';
            return;
        }

        data.reverse().forEach(row => { 
            let tr = document.createElement('tr');
            let actionButtons = '-';
            
            if (currentRole === 'kierownik' && row.status === 'Oczekujące') {
                actionButtons = `
                    <button class="btn btn-sm btn-success w-100 mb-1" onclick="updateStatus(${row.id}, 'Zaakceptowane')">Akceptuj</button>
                    <button class="btn btn-sm btn-danger w-100" onclick="rejectOrder(${row.id})">Odrzuć</button>
                `;
            } else if (currentRole === 'lukasz' && row.status === 'Zaakceptowane') {
                actionButtons = `<button class="btn btn-sm btn-primary w-100" onclick="updateStatus(${row.id}, 'Zamówione')">Kupione</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zamówione') {
                actionButtons = `<button class="btn btn-sm btn-info w-100" onclick="updateStatus(${row.id}, 'Dostarczone')">Dostarczono</button>`;
            }

            let statusColor = "bg-secondary";
            if(row.status === 'Zaakceptowane') statusColor = "bg-warning text-dark";
            if(row.status === 'Zamówione') statusColor = "bg-primary";
            if(row.status === 'Dostarczone') statusColor = "bg-success";
            if(row.status === 'Odrzucone') statusColor = "bg-danger";

            tr.innerHTML = `
                <td class="fw-bold">${row.produkt}</td>
                <td><span class="badge bg-dark">${row.strefa}</span></td>
                <td class="text-center">${row.ilosc}</td>
                <td class="small">${row.dataZam}</td>
                <td>${row.kto}</td>
                <td><a href="${row.link}" target="_blank" class="btn btn-sm btn-outline-secondary">Link</a></td>
                <td><span class="badge ${statusColor}">${row.status}</span></td>
                <td><div class="powod-text text-danger fw-bold">${row.powod}</div></td>
                <td style="min-width: 110px;">${actionButtons}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- SPECJALNA FUNKCJA DO ODRZUCANIA (wymusza powód) ---
    function rejectOrder(idWiersza) {
        const powod = prompt("Podaj powód odrzucenia (To pole jest wymagane!):");
        
        if (powod === null) {
            // Anulowano okienko (Esc)
            return; 
        } else if (powod.trim() === "") {
            // Zostawiono puste
            alert("Nie możesz odrzucić zamówienia bez podania powodu!");
            return;
        }

        // Jeśli jest powód, wysyłamy status Odrzucone z powodem
        updateStatus(idWiersza, 'Odrzucone', powod);
    }

    // --- ZMIANA STATUSU (ze wsparciem dla wysyłania powodu) ---
    async function updateStatus(idWiersza, newStatus, reason = '') {
        // Pytamy o potwierdzenie tylko jeśli to nie jest odrzucenie (bo tam już było okienko)
        if(newStatus !== 'Odrzucone' && !confirm(`Zmienić status na:\n"${newStatus}"?`)) return;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', id: idWiersza, newStatus: newStatus, reason: reason }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            loadData(); 
        } catch (error) {
            alert('Błąd: ' + error);
        }
    }
</script>
</body>
</html>
