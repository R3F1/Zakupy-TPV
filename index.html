<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień TPV - Dział Techniczny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GŁÓWNE ZMIENNE I TŁO --- */
        :root {
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-color: #f4f7fb; 
            --urgent-red: #ef4444;
        }
        
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.04), transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.04), transparent 30%);
            color: #1e293b;
            font-family: 'Poppins', sans-serif;
            margin-top: 80px; 
            overflow-x: hidden;
        }

        /* --- ANIMACJE --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseUrgent { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* --- NAVBAR --- */
        .navbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }
        .navbar-brand { color: #0f172a !important; font-weight: 700; letter-spacing: 0.5px; }
        .brand-icon { color: #3b82f6; text-shadow: 0 0 10px var(--primary-glow); }

        /* --- KARTY --- */
        .card { 
            border: none; border-radius: 20px; background: rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); transition: box-shadow 0.3s ease;
        }
        .card-header { border-radius: 20px 20px 0 0 !important; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85em; padding: 1.2rem; border-bottom: none; }
        .header-primary { background: linear-gradient(135deg, #3b82f6, #0ea5e9); color: white; }
        .header-dark { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }

        /* --- INPUTY I PRZYCISKI --- */
        .form-control, .form-select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 0.75rem 1rem; background-color: #f8fafc; font-size: 0.95em; }
        .form-control:focus, .form-select:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); border-color: #3b82f6; background-color: #ffffff; }
        .input-group-text { border-radius: 12px 0 0 12px; border: 1px solid #e2e8f0; border-right: none; background: #f8fafc; }
        .btn { border-radius: 12px; font-weight: 600; padding: 0.6rem 1.2rem; transition: all 0.2s; letter-spacing: 0.5px; }
        .btn:hover { transform: translateY(-2px); }

        /* --- TABELA (Premium UI) --- */
        .table-responsive { max-height: 65vh; overflow-y: auto; border-radius: 12px; }
        .table { margin-bottom: 0; }
        .table thead th { background-color: #f8fafc; border-bottom: 2px solid #e2e8f0; color: #64748b; text-transform: uppercase; font-size: 0.75em; padding: 1rem; position: sticky; top: 0; z-index: 10; }
        .table tbody td { vertical-align: middle; font-size: 0.9em; padding: 1rem 0.5rem; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .table-hover tbody tr:nth-of-type(odd) { background-color: rgba(241, 245, 249, 0.4); } /* Delikatna zebra */
        .table-hover tbody tr:hover td { background-color: #f0f9ff; }
        
        .powod-text { max-width: 180px; font-size: 0.85em; color: #ef4444; font-style: italic; line-height: 1.3; }
        .price-tag { color: #0891b2; font-weight: 700; font-family: monospace; font-size: 1.1em;}

        /* --- SOFT BADGES (Statusy) --- */
        .badge { padding: 0.6em 1em; font-size: 0.75em; border-radius: 8px; font-weight: 700; letter-spacing: 0.3px; display: inline-block; width: 100%; text-align: center;}
        .badge-soft-secondary { background-color: #f1f5f9; color: #475569; } /* Oczekujące */
        .badge-soft-warning { background-color: #fef3c7; color: #b45309; } /* Zaakceptowane */
        .badge-soft-primary { background-color: #dbeafe; color: #1d4ed8; } /* Zamówione */
        .badge-soft-success { background-color: #dcfce3; color: #15803d; } /* Dostarczone */
        .badge-soft-danger { background-color: #fee2e2; color: #b91c1c; } /* Odrzucone */

        /* --- ILOŚĆ I JEDNOSTKI (Idealne wyrównanie) --- */
        .qty-wrapper { display: flex; justify-content: center; align-items: center; gap: 6px; }
        .badge-unit { font-size: 0.75em; background: #e2e8f0; color: #475569; padding: 3px 6px; border-radius: 6px; font-weight: 600; }
        .editable-qty { cursor: pointer; text-decoration: underline dashed #cbd5e1; font-size: 1.1em; padding: 2px 6px; border-radius: 6px; transition: all 0.2s;}
        .editable-qty:hover { color: #3b82f6; text-decoration: underline solid #3b82f6; background: rgba(59,130,246,0.1); }

        /* --- PRIORYTET --- */
        .row-urgent { background-color: rgba(239, 68, 68, 0.04) !important; border-left: 4px solid var(--urgent-red) !important; }
        .badge-urgent { background-color: var(--urgent-red); color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.7em; animation: pulseUrgent 2s infinite; margin-right: 8px;}

        /* --- STATYSTYKI (Dashboard) --- */
        .stat-card { background: white; border-radius: 16px; padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; border: 1px solid #f1f5f9; transition: transform 0.2s;}
        .stat-card:hover { transform: translateY(-2px); }
        .stat-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.3em; }
        .stat-value { font-size: 1.5em; font-weight: 700; line-height: 1; color: #0f172a;}
        .stat-label { font-size: 0.75em; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}

        /* --- TOAST POWIADOMIENIA --- */
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 1050; }
        .custom-toast { background: white; border-radius: 12px; padding: 15px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 4px solid #10b981; }
        .custom-toast.show { transform: translateX(0); }

        /* --- SKELETON LOADER --- */
        .skeleton-box { height: 20px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }

        .archive-hidden { display: none !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

<div id="toastContainer">
    <div id="actionToast" class="custom-toast">
        <i class="bi bi-check-circle-fill text-success fs-4"></i>
        <div class="fw-bold text-dark" id="toastMessage">Akcja wykonana pomyślnie!</div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-glass fixed-top py-3">
    <div class="container-fluid px-4">
        <span class="navbar-brand fs-5">
            <i class="bi bi-hexagon-fill brand-icon me-2"></i> SYSTEM ZAMÓWIEŃ <span class="text-primary">TPV</span>
        </span>
        <div id="logoutBar" class="view-section text-end">
            <span class="me-3 fw-bold text-secondary small" id="userGreeting"></span>
            <button class="btn btn-sm btn-outline-danger fw-bold rounded-pill px-3" onclick="logout()">
                <i class="bi bi-power"></i> Wyloguj
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 pb-5">

    <div id="view-login" class="view-section active-view card mx-auto mt-5" style="max-width: 420px;">
        <div class="card-header header-dark text-center py-4">
            <div class="mb-2" style="animation: pulseGlow 2s infinite; display: inline-block; border-radius: 50%;">
                <i class="bi bi-fingerprint fs-1 text-info"></i>
            </div>
            <h5 class="mb-0 mt-2 fw-bold text-white">AUTORYZACJA</h5>
        </div>
        <div class="card-body p-4 pt-5 text-center">
            <form id="loginForm">
                <div class="input-group shadow-sm mb-3">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" id="loginInput" class="form-control" placeholder="Identyfikator" required>
                </div>
                <div class="input-group shadow-sm mb-4">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" id="passInput" class="form-control" placeholder="Hasło" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fs-6">ZALOGUJ SIĘ</button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card mx-auto mb-4" style="max-width: 900px;">
        <div class="card-header header-primary py-3 d-flex align-items-center">
            <i class="bi bi-plus-circle-dotted fs-5 me-2"></i> Formularz Nowego Zapotrzebowania
        </div>
        <div class="card-body p-4 p-md-5">
            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="row g-4">
                    <div class="col-md-5">
                        <label class="form-label fw-bold text-muted small">PRODUKT / NAZWA RZECZY</label>
                        <input type="text" id="produkt" class="form-control" placeholder="Wpisz nazwę..." required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted small">STREFA</label>
                        <select id="strefa" class="form-select" required>
                            <option value="" disabled selected>Wybierz...</option>
                            <option value="OCR">OCR</option>
                            <option value="LCM">LCM</option>
                            <option value="LCDR">LCDR</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted small">ILOŚĆ & JEDN.</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <input type="number" id="ilosc" class="form-control text-center text-primary fw-bold" min="1" value="1" required style="min-width: 60px;">
                            <select id="jednostka" class="form-select bg-light fw-bold text-secondary px-2" style="width: auto;">
                                <option value="PCS">PCS</option><option value="BOX">BOX</option><option value="ML">ML</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted small text-danger">PRIORYTET</label>
                        <select id="priorytet" class="form-select fw-bold">
                            <option value="Normalny">Normal</option><option value="PILNE">🔥 PILNE</option>
                        </select>
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted small">SZACOWANA CENA (PLN)</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <span class="input-group-text"><i class="bi bi-currency-exchange"></i></span>
                            <input type="number" id="cena" class="form-control" placeholder="Np. 150">
                        </div>
                    </div>
                    <div class="col-md-9">
                        <label class="form-label fw-bold text-muted small">LINK DO SKLEPU</label>
                        <div class="input-group shadow-sm flex-nowrap">
                            <span class="input-group-text"><i class="bi bi-link-45deg text-primary"></i></span>
                            <input type="url" id="link" class="form-control" placeholder="Wklej pełny adres URL (https://...)" required>
                        </div>
                    </div>
                    <div class="col-12 mt-4 pt-2 border-top text-end">
                        <button type="submit" class="btn btn-success px-5 py-2 fs-6 shadow-sm">
                            Wyślij zapotrzebowanie <i class="bi bi-send ms-2"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card shadow-sm mb-5">
        <div class="card-header header-dark d-flex justify-content-between align-items-center py-3 px-4">
            <span class="fs-6"><i class="bi bi-database me-2"></i> Baza Zgłoszeń</span>
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch text-white mb-0 me-2">
                    <input class="form-check-input" type="checkbox" id="archiveSwitch" onchange="toggleArchive()">
                    <label class="form-check-label small fw-bold" for="archiveSwitch">Pokaż Archiwum</label>
                </div>
                <button class="btn btn-sm btn-light text-dark fw-bold rounded-pill px-3 shadow-sm" onclick="loadData()">
                    <i class="bi bi-arrow-clockwise text-primary"></i> Odśwież
                </button>
            </div>
        </div>
        
        <div class="card-body p-4 bg-light rounded-bottom">
            
            <div class="row g-3 mb-4" id="statsDashboard">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-hourglass-split"></i></div>
                        <div><div class="stat-value" id="stat-oczekujace">0</div><div class="stat-label">Do akceptacji</div></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-cart-check"></i></div>
                        <div><div class="stat-value" id="stat-zaakceptowane">0</div><div class="stat-label">Do Kupienia</div></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-truck"></i></div>
                        <div><div class="stat-value" id="stat-zamowione">0</div><div class="stat-label">W Drodze</div></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-box-seam"></i></div>
                        <div><div class="stat-value" id="stat-dostarczone">0</div><div class="stat-label">Zakończone</div></div>
                    </div>
                </div>
            </div>

            <div class="filters-wrapper d-flex flex-wrap justify-content-between align-items-center gap-3 bg-white shadow-sm border-0">
                <div class="d-flex gap-2 flex-wrap" id="statusFilters">
                    <span class="text-slate-400 small fw-bold mt-2 me-2 d-none d-md-block"><i class="bi bi-funnel"></i> FILTRY:</span>
                    <button class="btn btn-dark btn-sm active rounded-pill px-3" onclick="filterByStatus('wszystkie', this)">Wszystkie</button>
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 border-0 bg-secondary bg-opacity-10" onclick="filterByStatus('oczekujące', this)">Oczekujące</button>
                    <button class="btn btn-outline-warning btn-sm rounded-pill px-3 border-0 bg-warning bg-opacity-10" onclick="filterByStatus('zaakceptowane', this)">Zaakceptowane</button>
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3 border-0 bg-primary bg-opacity-10" onclick="filterByStatus('zamówione', this)">Zamówione</button>
                </div>
                <div class="input-group search-container shadow-sm" style="max-width: 280px;">
                    <span class="input-group-text border-0 bg-light"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control border-0 bg-light" placeholder="Szukaj po nazwie...">
                </div>
            </div>

            <div class="table-responsive bg-white border border-light shadow-sm">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="text-center" style="width: 50px;">#</th>
                            <th style="min-width: 250px;">Produkt</th>
                            <th class="text-center">Strefa</th>
                            <th class="text-center" style="min-width: 110px;">Ilość</th>
                            <th class="text-center">Cena</th>
                            <th class="text-center">Data</th>
                            <th class="text-center">Zgłasza</th>
                            <th class="text-center">Sklep</th>
                            <th class="text-center" style="min-width: 140px;">Status</th>
                            <th style="min-width: 140px;">Uwagi</th>
                            <th class="text-center" style="min-width: 130px;">Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaocet4gWbk0cF7xe2gYxBNjVK18gxQACz_PB_KZfmojoztuggqChtmJX8qAEBMXGsfw/exec'; 
    
    let currentRole = 'none';
    let currentUser = '';
    let showArchive = false; 

    const users = {
        'lider lcm': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCM' },
        'lider lcdr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider LCDR' },
        'lider ocr': { haslo: 'tpv12345!', rola: 'lider', nazwa: 'Lider OCR' },
        'kierownik': { haslo: 'tpv12345!', rola: 'kierownik', nazwa: 'Kierownik' },
        'łukasz': { haslo: 'tpv12345!', rola: 'lukasz', nazwa: 'Łukasz' }
    };

    window.onload = () => {
        const r = localStorage.getItem('userRole'), u = localStorage.getItem('userLogin');
        if (r && u) setupInterface(r, u);
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputLogin = document.getElementById('loginInput').value.trim().toLowerCase();
        const pass = document.getElementById('passInput').value;

        if (users[inputLogin] && users[inputLogin].haslo === pass) {
            const rola = users[inputLogin].rola;
            const ladnaNazwa = users[inputLogin].nazwa;
            localStorage.setItem('userRole', rola);
            localStorage.setItem('userLogin', ladnaNazwa);
            setupInterface(rola, ladnaNazwa);
            showToast('Zalogowano pomyślnie!', 'success');
        } else {
            const card = document.getElementById('view-login');
            card.style.transform = 'translateX(-10px)';
            setTimeout(() => card.style.transform = 'translateX(10px)', 100);
            setTimeout(() => card.style.transform = 'translateX(0)', 200);
            alert('Błędny identyfikator lub hasło!');
        }
    });

    function setupInterface(role, login) {
        currentRole = role; currentUser = login;
        document.querySelectorAll('.view-section').forEach(el => { el.classList.remove('active-view'); void el.offsetWidth; });
        document.getElementById('logoutBar').classList.add('active-view');
        document.getElementById('userGreeting').innerHTML = `<i class="bi bi-person-circle text-primary"></i> ${login}`;
        document.getElementById('view-table').classList.add('active-view');
        if (currentRole === 'lider') document.getElementById('view-lider').classList.add('active-view');
        loadData();
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- FUNKCJE POMOCNICZE (TOAST I LINKI) ---
    function showToast(msg, type='success') {
        const toast = document.getElementById('actionToast');
        const msgEl = document.getElementById('toastMessage');
        const icon = toast.querySelector('i');
        
        msgEl.innerText = msg;
        toast.style.borderLeftColor = type === 'danger' ? '#ef4444' : '#10b981';
        icon.className = type === 'danger' ? 'bi bi-x-circle-fill text-danger fs-4' : 'bi bi-check-circle-fill text-success fs-4';
        
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('Skopiowano link do schowka!');
        });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; 
            return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()}`; 
        } catch (e) { return dateStr; }
    }

    function toggleArchive() {
        showArchive = document.getElementById('archiveSwitch').checked;
        loadData();
    }

    // --- EDYCJA W LOCIE ---
    async function editQty(id, oldQty, btnElement) {
        const newQty = prompt("Wpisz nową ilość:", oldQty);
        if (newQty && newQty != oldQty) {
            const row = btnElement.closest('tr');
            const qtyCell = row.querySelector('.qty-wrapper');
            const unitBadge = qtyCell.querySelector('.badge-unit').outerHTML; 
            
            qtyCell.innerHTML = '<span class="spinner-border spinner-border-sm text-primary"></span>';
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'edit', id: id, newQty: newQty }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                qtyCell.innerHTML = `<span class="editable-qty" onclick="editQty(${id}, ${newQty}, this)">${newQty}</span>${unitBadge}`;
                showToast('Zaktualizowano ilość!');
            } catch(e) {
                showToast('Błąd aktualizacji', 'danger');
                qtyCell.innerHTML = `<span class="editable-qty" onclick="editQty(${id}, ${oldQty}, this)">${oldQty}</span>${unitBadge}`;
            }
        }
    }

    // --- DODAWANIE ---
    async function submitOrder(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Wysyłanie...';

        const data = {
            action: 'add', produkt: document.getElementById('produkt').value, strefa: document.getElementById('strefa').value,
            ilosc: document.getElementById('ilosc').value, jednostka: document.getElementById('jednostka').value,
            link: document.getElementById('link').value, kto: currentUser,
            priorytet: document.getElementById('priorytet').value, cena: document.getElementById('cena').value 
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
            e.target.reset(); showToast('Zapotrzebowanie zostało wysłane!'); loadData(); 
            document.getElementById('view-table').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (error) { showToast('Błąd wysyłania', 'danger'); } 
        finally { btn.disabled = false; btn.innerHTML = originalText; }
    }

    // --- ŁADOWANIE I RENDEROWANIE BAZY ---
    async function loadData() {
        const tbody = document.getElementById('ordersTableBody');
        // SKELETON LOADER
        let skeletonHtml = '';
        for(let i=0; i<5; i++) skeletonHtml += `<tr><td colspan="11"><div class="skeleton-box"></div></td></tr>`;
        tbody.innerHTML = skeletonHtml;
        
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            renderTable(data);
            
            document.getElementById('searchInput').value = "";
            const allBtn = document.querySelector('#statusFilters button');
            if(allBtn && !document.getElementById('searchInput').value) filterByStatus('wszystkie', allBtn);
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="11" class="text-danger text-center py-5 fw-bold">Błąd połączenia z bazą Google.</td></tr>';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';
        if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-5">Brak zamówień w bazie</td></tr>'; return; }

        let lp = 1;
        let statOczek = 0, statZaakc = 0, statZamow = 0, statDost = 0;
        
        data.reverse().forEach(row => { 
            // Liczenie statystyk
            if (row.status === 'Oczekujące') statOczek++;
            if (row.status === 'Zaakceptowane') statZaakc++;
            if (row.status === 'Zamówione') statZamow++;
            if (row.status === 'Dostarczone') statDost++;

            if (!showArchive && row.status === 'Dostarczone') return;

            let tr = document.createElement('tr');
            tr.setAttribute('data-status', row.status.toLowerCase());
            if (row.priorytet === 'PILNE') tr.className = 'row-urgent';
            
            const czyToWlasciciel = row.kto && currentUser && (row.kto.toLowerCase() === currentUser.toLowerCase());
            let actionButtons = '-';
            
            if (currentRole === 'kierownik' && row.status === 'Oczekujące') {
                actionButtons = `<button class="btn btn-sm btn-success w-100 mb-1" onclick="updateStatus(${row.id}, 'Zaakceptowane', '', this)">Akceptuj</button>
                                 <button class="btn btn-sm btn-outline-danger w-100 bg-white" onclick="rejectOrder(${row.id}, this)">Odrzuć</button>`;
            } else if (currentRole === 'lider' && row.status === 'Oczekujące' && czyToWlasciciel) {
                actionButtons = `<button class="btn btn-sm btn-outline-danger w-100" onclick="deleteOrder(${row.id}, this)" title="Anuluj zapotrzebowanie"><i class="bi bi-trash"></i> Usuń</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zaakceptowane') {
                actionButtons = `<button class="btn btn-sm btn-primary w-100" onclick="updateStatus(${row.id}, 'Zamówione', '', this)">Kupione</button>`;
            } else if (currentRole === 'lukasz' && row.status === 'Zamówione') {
                actionButtons = `<button class="btn btn-sm btn-info w-100 text-white" onclick="updateStatus(${row.id}, 'Dostarczone', '', this)">Odbiór paczki</button>`;
            }

            // SOFT BADGES DLA STATUSÓW
            let sClass = "badge-soft-secondary";
            if(row.status === 'Zaakceptowane') sClass = "badge-soft-warning";
            if(row.status === 'Zamówione') sClass = "badge-soft-primary";
            if(row.status === 'Dostarczone') sClass = "badge-soft-success";
            if(row.status === 'Odrzucone') sClass = "badge-soft-danger";

            const pBadge = row.priorytet === 'PILNE' ? '<span class="badge-urgent">PILNE</span>' : '';
            const cenaWidok = row.cena ? `<span class="price-tag">${row.cena} zł</span>` : '-';
            
            // IDEALNE WYRÓWNANIE ILOŚCI (FLEXBOX)
            const canEdit = (currentRole === 'lider' && row.status === 'Oczekujące' && czyToWlasciciel);
            const qtyHtml = canEdit ? `<span class="editable-qty" onclick="editQty(${row.id}, ${row.ilosc}, this)" title="Edytuj">${row.ilosc}</span>` : `<span class="fw-bold fs-6 text-primary">${row.ilosc}</span>`;
            const jednostkaHtml = `<span class="badge-unit">${row.jednostka || 'PCS'}</span>`;

            tr.innerHTML = `
                <td class="text-center text-muted small">${lp++}</td>
                <td class="text-dark"><div class="d-flex align-items-center">${pBadge}<span class="fw-bolder" style="font-size: 1.05em;">${row.produkt}</span></div></td>
                <td class="text-center"><span class="badge bg-light text-dark border border-secondary-subtle px-2 py-1 rounded shadow-sm">${row.strefa}</span></td>
                <td class="text-center"><div class="qty-wrapper">${qtyHtml}${jednostkaHtml}</div></td>
                <td class="text-center">${cenaWidok}</td>
                <td class="text-center align-middle text-muted small">${formatDate(row.dataZam)}</td>
                <td class="text-center small text-muted"><i class="bi bi-person text-secondary me-1"></i>${row.kto}</td>
                <td class="text-center">
                    <div class="btn-group shadow-sm">
                        <a href="${row.link}" target="_blank" class="btn btn-sm btn-light border text-primary"><i class="bi bi-box-arrow-up-right"></i> Sklep</a>
                        <button class="btn btn-sm btn-light border text-secondary px-2" onclick="copyToClipboard('${row.link}')" title="Kopiuj link"><i class="bi bi-clipboard"></i></button>
                    </div>
                </td>
                <td class="text-center"><span class="badge ${sClass}">${row.status}</span></td>
                <td class="powod-text small">${row.powod}</td>
                <td class="text-center align-middle px-2">${actionButtons}</td>
            `;
            tbody.appendChild(tr);
        });

        // Aktualizacja Dashboardu
        document.getElementById('stat-oczekujace').innerText = statOczek;
        document.getElementById('stat-zaakceptowane').innerText = statZaakc;
        document.getElementById('stat-zamowione').innerText = statZamow;
        document.getElementById('stat-dostarczone').innerText = statDost;
    }

    function filterByStatus(statusName, btnElement) {
        const buttons = document.querySelectorAll('#statusFilters button');
        buttons.forEach(b => {
            b.classList.remove('btn-dark', 'text-white', 'shadow-sm');
            b.classList.add('bg-opacity-10', 'text-dark', 'border-0');
            b.classList.remove('active');
        });
        
        btnElement.classList.remove('bg-opacity-10', 'text-dark', 'border-0');
        btnElement.classList.add('btn-dark', 'text-white', 'active', 'shadow-sm');

        const rows = document.querySelectorAll('#ordersTableBody tr');
        rows.forEach(row => {
            if(statusName === 'wszystkie') { row.style.display = ""; } 
            else {
                row.style.display = row.getAttribute('data-status') === statusName ? "" : "none";
            }
        });
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll('#ordersTableBody tr');
        const allBtn = document.querySelector('#statusFilters button:first-child');
        if(allBtn) filterByStatus('wszystkie', allBtn);
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none"; });
    });

    function rejectOrder(idWiersza, btnElement) {
        const powod = prompt("Podaj powód odrzucenia (Będzie widoczny dla Lidera):");
        if (powod) updateStatus(idWiersza, 'Odrzucone', powod, btnElement);
    }

    async function deleteOrder(id, btnElement) {
        if (!confirm('Anulować to zgłoszenie?')) return;
        const row = btnElement.closest('tr'); row.style.opacity = '0.3'; row.style.pointerEvents = 'none';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
            row.remove(); showToast('Usunięto pomyślnie!');
        } catch(e) { showToast('Błąd komunikacji', 'danger'); row.style.opacity = '1'; row.style.pointerEvents = 'auto'; }
    }

    async function updateStatus(id, stat, reason = '', btn) {
        if(stat !== 'Odrzucone' && !confirm(`Potwierdzasz zmianę na: "${stat}"?`)) return;
        const row = btn.closest('tr');
        if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id: id, newStatus: stat, reason: reason }) });
            if (row) {
                let sClass = "badge-soft-secondary";
                if(stat === 'Zaakceptowane') sClass = "badge-soft-warning";
                if(stat === 'Zamówione') sClass = "badge-soft-primary";
                if(stat === 'Dostarczone') sClass = "badge-soft-success";
                if(stat === 'Odrzucone') sClass = "badge-soft-danger";

                row.querySelector('td:nth-child(9)').innerHTML = `<span class="badge ${sClass}">${stat}</span>`;
                row.setAttribute('data-status', stat.toLowerCase());
                if (stat === 'Odrzucone') row.querySelector('td:nth-child(10)').innerText = reason;
                row.querySelector('td:nth-child(11)').innerHTML = '<span class="badge bg-light text-success border border-success"><i class="bi bi-check-all"></i> Gotowe</span>';

                row.style.opacity = '1'; row.style.pointerEvents = 'auto';
                showToast(`Zmieniono status na: ${stat}`);
                if (stat === 'Dostarczone' && !showArchive) setTimeout(() => row.style.display = 'none', 500);
            }
        } catch (error) { showToast('Błąd sieci', 'danger'); row.style.opacity = '1'; row.style.pointerEvents = 'auto'; }
    }
</script>
</body>
</html>
