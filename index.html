<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zamówień Wewnętrznych</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Prosty styl, który pozwala nam ukrywać i pokazywać odpowiednie ekrany */
        .view-section { display: none; }
        .active-view { display: block; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">System Zamówień - Dział Techniczny</h2>

    <div id="logoutBar" class="text-end mb-3 view-section">
        <span class="me-3 fw-bold" id="userGreeting">Zalogowano jako: (tutaj bedzie login)</span>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">Wyloguj</button>
    </div>

    <div id="view-login" class="view-section active-view card mx-auto shadow-sm" style="max-width: 400px;">
        <div class="card-header bg-dark text-white text-center">Logowanie do systemu</div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" id="loginInput" class="form-control" placeholder="Wpisz login..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hasło</label>
                    <input type="password" id="passInput" class="form-control" placeholder="Wpisz hasło..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">Zaloguj się</button>
            </form>
        </div>
    </div>

    <div id="view-lider" class="view-section card shadow-sm">
        <div class="card-header bg-primary text-white">Panel Lidera - Nowe Zamówienie</div>
        <div class="card-body">
            <form id="orderForm">
                <div class="mb-3">
                    <label class="form-label">Dział</label>
                    <select id="dzial" class="form-select" required>
                        <option value="" disabled selected>Wybierz dział...</option>
                        <option value="OCR">OCR</option>
                        <option value="LCM">LCM</option>
                        <option value="LCDR">LCDR</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nazwa przedmiotu</label>
                    <input type="text" id="nazwa" class="form-control" placeholder="Np. Płyn do czyszczenia matryc" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Link do produktu</label>
                    <input type="url" id="link" class="form-control" placeholder="https://..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ilość</label>
                    <input type="number" id="ilosc" class="form-control" min="1" value="1" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Wyślij do akceptacji Kierownika</button>
            </form>
        </div>
    </div>

    <div id="view-table" class="view-section card mt-4 shadow-sm">
        <div class="card-header bg-dark text-white" id="table-title">Lista Zamówień</div>
        <div class="card-body">
            <button class="btn btn-sm btn-outline-secondary mb-3" onclick="loadData()">Odśwież listę</button>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Dział</th>
                            <th>Nazwa</th>
                            <th>Link</th>
                            <th>Ilość</th>
                            <th>Status</th>
                            <th>Akcja</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="6" class="text-center text-muted">Brak danych do wyświetlenia. Zaloguj się.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    // Tu będzie nasz kod ożywiający stronę
</script>

</body>
</html>
